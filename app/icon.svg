<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded black background -->
  <rect width="512" height="512" rx="120" fill="#050505" />

  <!-- Soft golden glow -->
  <defs>
    <radialGradient id="venusGlow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#fdf9f0" />
      <stop offset="35%" stop-color="#f1d189" />
      <stop offset="100%" stop-color="#c9a227" />
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e9d0" />
      <stop offset="100%" stop-color="#c9a227" />
    </linearGradient>
  </defs>

  <!-- Central golden orb -->
  <circle cx="256" cy="220" r="96" fill="url(#venusGlow)" />

  <!-- Delicate orbit ring -->
  <ellipse
    cx="256"
    cy="260"
    rx="150"
    ry="72"
    fill="none"
    stroke="url(#ring)"
    stroke-width="10"
    stroke-linecap="round"
    opacity="0.9"
  />

  <!-- Subtle lower reflection -->
  <ellipse
    cx="256"
    cy="340"
    rx="90"
    ry="24"
    fill="#111111"
    opacity="0.65"
  />
</svg>
